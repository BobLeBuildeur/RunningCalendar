name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate CSV schemas
        run: npm run validate-csv

      - name: Astro check
        run: npx astro check

      - name: Build
        run: npm run build

  scrapers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Pytest (scrapers)
        run: python3 -m pytest scrapers/tests/ -q
