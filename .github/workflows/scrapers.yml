name: Scrapers

on:
  workflow_dispatch:

jobs:
  scrapers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scrapers
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: scrapers
        run: python3 -m pytest tests/ -q

      - name: Run Iguana scraper (stdout)
        working-directory: scrapers
        run: python3 run_scrapers.py iguana | head -n 5

      - name: Run Yescom scraper (stdout)
        working-directory: scrapers
        run: python3 run_scrapers.py yescom --yescom-year 2026 | head -n 5
