name: Scrapers

on:
  workflow_dispatch:

jobs:
  scrapers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scrapers
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: scrapers
        env:
          RUNNINGCALENDAR_DATABASE_URL: ${{ secrets.RUNNINGCALENDAR_DATABASE_URL }}
        run: python3 -m pytest tests/ -q

      - name: Run Iguana scraper (stdout)
        working-directory: scrapers
        env:
          RUNNINGCALENDAR_DATABASE_URL: ${{ secrets.RUNNINGCALENDAR_DATABASE_URL }}
        run: python3 run_scrapers.py run iguana | head -n 5

      - name: Run Yescom scraper (stdout)
        working-directory: scrapers
        env:
          RUNNINGCALENDAR_DATABASE_URL: ${{ secrets.RUNNINGCALENDAR_DATABASE_URL }}
        run: python3 run_scrapers.py run yescom --year 2026 | head -n 5

      - name: Run Corre Brasil scraper (stdout)
        working-directory: scrapers
        env:
          RUNNINGCALENDAR_DATABASE_URL: ${{ secrets.RUNNINGCALENDAR_DATABASE_URL }}
        run: python3 run_scrapers.py run corre_brasil --year 2026 | head -n 5

      # Scrapers load FK metadata from PostgreSQL; set RUNNINGCALENDAR_DATABASE_URL in repo secrets.
      # --save-to writes to Supabase; same URI as build / validate-db.
